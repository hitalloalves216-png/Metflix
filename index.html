<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metflix</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #141414;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: black;
}

header h1 { color: red; }

input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* PLAYER / DETALHES */
.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 999;
}

.bg-blur {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: blur(20px);
  opacity: 0.3;
}

.player-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  height: 100%;
  backdrop-filter: brightness(0.6);
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-size: 18px;
}

.fechar {
  font-size: 25px;
  cursor: pointer;
}

.player iframe {
  flex: 1;
  width: 100%;
  border: none;
}

/* BOTÕES */
.btn {
  display: block;
  text-align: center;
  padding: 10px;
  margin: 5px;
  text-decoration: none;
  color: white;
  cursor: pointer;
}

.assistir {
  background: #e50914;
}

.rave {
  background: black;
  border: 1px solid #e50914;
}

/* LISTA */
.section { padding: 10px; }

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

/* CARD NOVO */
.card {
  min-width: 170px;
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.info {
  padding: 8px;
}

.info h3 {
  font-size: 14px;
  margin: 5px 0;
}

.sinopse {
  font-size: 11px;
  color: #bbb;
  height: 50px;
  overflow: hidden;
}
</style>
</head>

<body>

<header>
  <h1>METFLIX</h1>
  <input id="search" placeholder="Buscar...">
</header>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="bg-blur" id="bgBlur"></div>

  <div class="player-content">
    <div class="topbar">
      <span id="tituloFilme"></span>
      <div class="fechar" onclick="fecharPlayer()">✕</div>
    </div>

    <iframe id="videoFrame" allowfullscreen></iframe>

    <div style="text-align:center; padding:10px;">
      <a id="raveBtn" class="btn rave" target="_blank">📲 Assistir no Rave</a>
    </div>
  </div>
</div>

<!-- DETALHES -->
<div class="player" id="detalhes">

  <div class="bg-blur" id="bgDetalhes"></div>

  <div class="player-content">

    <div class="topbar">
      <span id="tituloDetalhes"></span>
      <div class="fechar" onclick="fecharDetalhes()">✕</div>
    </div>

    <div style="padding: 20px; text-align:center;">
      
      <div class="btn assistir" onclick="assistirAgora()">▶ Assistir aqui</div>
      
      <a id="raveDetalhes" class="btn rave" target="_blank">
        📲 Assistir no Rave
      </a>

      <p id="sinopseDetalhes" style="margin-top:20px; color:#ccc;"></p>

    </div>

  </div>
</div>

<!-- FILMES -->
<div class="section">
  <h2>Filmes</h2>
  <div class="row" id="filmes"></div>
</div>

<script>

const filmes = [
  {
    nome: "Olhos Famintos",
    img: "https://image.tmdb.org/t/p/original/4deKiUXWqyATIEKCBSjRxCOLvu0.jpg",
    sinopse: "Uma criatura misteriosa desperta a cada 23 anos para se alimentar de humanos.",
    video: "https://drive.google.com/file/d/13sgdCjcgbF_3EN0ldWBWNktgwTyZE_sX/preview",
    rave: "https://drive.google.com/file/d/13sgdCjcgbF_3EN0ldWBWNktgwTyZE_sX/view?usp=sharing"
  }
];

let videoAtual = "";
let raveAtual = "";

/* CARD */
function criarCard(f, i) {
  return `
  <div class="card">
    <img src="${f.img}">

    <div class="info">
      <h3>${f.nome}</h3>
      <p class="sinopse">${f.sinopse}</p>

      <div class="btn assistir" onclick="abrirDetalhes(${i})">
        ▶ Assistir
      </div>
    </div>
  </div>
  `;
}

/* RENDER */
function render(lista = filmes) {
  document.getElementById("filmes").innerHTML =
    lista.map((f, i) => criarCard(f, i)).join("");
}

/* DETALHES */
function abrirDetalhes(index) {
  const f = filmes[index];

  videoAtual = f.video;
  raveAtual = f.rave;

  document.getElementById("tituloDetalhes").innerText = f.nome;
  document.getElementById("sinopseDetalhes").innerText = f.sinopse;
  document.getElementById("raveDetalhes").href = f.rave;
  document.getElementById("bgDetalhes").style.backgroundImage = `url(${f.img})`;

  document.getElementById("detalhes").style.display = "block";
}

function fecharDetalhes() {
  document.getElementById("detalhes").style.display = "none";
}

/* PLAYER */
function assistirAgora() {
  fecharDetalhes();
  abrirPlayer(videoAtual, raveAtual);
}

function abrirPlayer(video, rave) {
  document.getElementById("videoFrame").src = video;
  document.getElementById("raveBtn").href = rave;
  document.getElementById("player").style.display = "block";
}

function fecharPlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("videoFrame").src = "";
}

/* BUSCA */
document.getElementById("search").addEventListener("input", function() {
  let valor = this.value.toLowerCase();

  let filtrados = filmes.filter(f =>
    f.nome.toLowerCase().includes(valor)
  );

  render(filtrados);
});

render();

</script>

</body>
</html>
