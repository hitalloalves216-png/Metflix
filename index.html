<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metflix</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #141414;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: black;
}

header h1 { color: red; }

/* BUSCA */
input {
  padding: 6px 10px;
  border-radius: 20px;
  border: none;
  width: 120px;
  background: #222;
  color: white;
  outline: none;
}

/* PLAYER */
.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 999;
  background: black;
}

.player-content {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* TOPO */
.topbar {
  display: flex;
  justify-content: flex-end;
  padding: 10px;
}

.fechar {
  font-size: 28px;
  cursor: pointer;
}

/* VIDEO ANTIGO */
.player iframe {
  width: 100%;
  height: 90%;
  border: none;
}

/* DETALHES ANIMAÇÃO */
#detalhes {
  animation: fadeZoom 0.3s ease;
}

@keyframes fadeZoom {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* BOTÃO */
.btn {
  padding: 12px;
  background: #e50914;
  text-align: center;
  cursor: pointer;
  border-radius: 5px;
}

/* LISTA */
.section { padding: 10px; }

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.card {
  min-width: 170px;
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.info {
  padding: 8px;
}

.info h3 {
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  <h1>METFLIX</h1>
  <input id="search" placeholder="Buscar...">
</header>

<!-- PLAYER (ANTIGO) -->
<div class="player" id="player">
  <div class="player-content">
    <div class="topbar">
      <div class="fechar" onclick="fecharPlayer()">✕</div>
    </div>

    <iframe id="videoFrame" allowfullscreen></iframe>
  </div>
</div>

<!-- DETALHES -->
<div class="player" id="detalhes">
  <div class="player-content">
    <div class="topbar">
      <span id="tituloDetalhes"></span>
      <div class="fechar" onclick="fecharDetalhes()">✕</div>
    </div>

    <div style="padding:20px; text-align:center;">
      <div class="btn" onclick="assistirAgora()">▶ Assistir</div>

      <p style="margin-top:20px; color:#ccc;">
        Se quiser assistir junto com alguém, baixe o aplicativo <b>fofuxin</b> 📲
      </p>
    </div>
  </div>
</div>

<!-- FILMES -->
<div class="section">
  <h2>Filmes</h2>
  <div class="row" id="filmes"></div>
</div>

<script>

const filmes = [
  {
    nome: "Olhos Famintos",
    img: "https://image.tmdb.org/t/p/original/4deKiUXWqyATIEKCBSjRxCOLvu0.jpg",
    video: "https://archive.org/download/olhos-famintos.mp4/Olhos%20Famintos.mp4"
  }
];

let videoAtual = "";

/* CARD */
function criarCard(f, i) {
  return `
  <div class="card">
    <img src="${f.img}">
    <div class="info">
      <h3>${f.nome}</h3>
      <div class="btn" onclick="abrirDetalhes(${i})">▶ Assistir</div>
    </div>
  </div>
  `;
}

/* RENDER */
function render(lista = filmes) {
  document.getElementById("filmes").innerHTML =
    lista.map((f, i) => criarCard(f, i)).join("");
}

/* DETALHES */
function abrirDetalhes(index) {
  const f = filmes[index];
  videoAtual = f.video;

  document.getElementById("tituloDetalhes").innerText = f.nome;
  document.getElementById("detalhes").style.display = "block";
}

function fecharDetalhes() {
  document.getElementById("detalhes").style.display = "none";
}

/* PLAYER */
function assistirAgora() {
  fecharDetalhes();
  abrirPlayer(videoAtual);
}

function abrirPlayer(video) {
  document.getElementById("videoFrame").src = video;
  document.getElementById("player").style.display = "block";
}

function fecharPlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("videoFrame").src = "";
}

/* BUSCA */
document.getElementById("search").addEventListener("input", function() {
  let valor = this.value.toLowerCase();

  let filtrados = filmes.filter(f =>
    f.nome.toLowerCase().includes(valor)
  );

  render(filtrados);
});

render();

</script>

</body>
</html>
