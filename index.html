<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metflix</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #141414;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: black;
}

header h1 { color: red; }

/* BUSCA MODERNA */
input {
  padding: 6px 10px;
  border-radius: 20px;
  border: none;
  width: 140px;
  background: #222;
  color: white;
  outline: none;
  transition: 0.3s;
}

input:focus {
  width: 180px;
  background: #333;
}

input::placeholder {
  color: #888;
}

/* PLAYER */
.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  z-index: 999;
}

.topbar {
  display: flex;
  justify-content: flex-end;
  padding: 10px;
}

.fechar {
  font-size: 28px;
  cursor: pointer;
}

/* VIDEO */
video {
  width: 100%;
  height: 75%;
  background: black;
}

/* CONTROLES */
.controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.controls button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.controls input {
  flex: 1;
}

#tempo {
  font-size: 12px;
  color: #ccc;
}

/* RAVE */
.rave {
  position: absolute;
  bottom: 60px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  padding: 8px 12px;
  border-radius: 20px;
  text-decoration: none;
  color: white;
  font-size: 13px;
}

.rave:hover {
  background: red;
}

/* LISTA */
.section { padding: 10px; }

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

/* CARD */
.card {
  min-width: 170px;
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.info { padding: 8px; }

.sinopse {
  font-size: 11px;
  color: #bbb;
  height: 50px;
  overflow: hidden;
}

.btn {
  text-align: center;
  padding: 8px;
  background: #e50914;
  margin-top: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>METFLIX</h1>
  <input id="search" placeholder="Buscar...">
</header>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="topbar">
    <div class="fechar" onclick="fecharPlayer()">✕</div>
  </div>

  <video id="videoFrame"></video>

  <a id="raveBtn" class="rave" target="_blank">📲 Rave</a>

  <div class="controls">
    <button onclick="togglePlay()">▶️</button>
    <input type="range" id="progress" value="0">
    <span id="tempo">0:00 / 0:00</span>
    <button onclick="fullscreen()">⛶</button>
  </div>
</div>

<!-- FILMES -->
<div class="section">
  <h2>Filmes</h2>
  <div class="row" id="filmes"></div>
</div>

<script>

const filmes = [
  {
    nome: "Olhos Famintos",
    img: "https://image.tmdb.org/t/p/original/4deKiUXWqyATIEKCBSjRxCOLvu0.jpg",
    sinopse: "Criatura misteriosa que aparece a cada 23 anos.",
    video: "https://drive.google.com/file/d/ID/review",
    rave: "https://drive.google.com/file/d/ID/view"
  }
];

const video = document.getElementById("videoFrame");
const progress = document.getElementById("progress");
const tempo = document.getElementById("tempo");

/* PLAYER */
function abrirPlayer(filme) {
  video.src = filme.video;
  video.play();

  document.getElementById("raveBtn").href = filme.rave;
  document.getElementById("player").style.display = "block";
}

function fecharPlayer() {
  video.pause();
  video.src = "";
  document.getElementById("player").style.display = "none";
}

/* CONTROLES */
function togglePlay() {
  if (video.paused) video.play();
  else video.pause();
}

video.addEventListener("timeupdate", () => {
  progress.value = (video.currentTime / video.duration) * 100;

  let atual = formatar(video.currentTime);
  let total = formatar(video.duration);

  tempo.innerText = `${atual} / ${total}`;
});

progress.addEventListener("input", () => {
  video.currentTime = (progress.value / 100) * video.duration;
});

function fullscreen() {
  video.requestFullscreen();
}

function formatar(s) {
  if (!s) return "0:00";
  let min = Math.floor(s / 60);
  let seg = Math.floor(s % 60);
  if (seg < 10) seg = "0" + seg;
  return `${min}:${seg}`;
}

/* CARDS */
function criarCard(f) {
  return `
  <div class="card">
    <img src="${f.img}">
    <div class="info">
      <h3>${f.nome}</h3>
      <p class="sinopse">${f.sinopse}</p>
      <div class="btn" onclick='abrirPlayer(${JSON.stringify(f)})'>
        ▶ Assistir
      </div>
    </div>
  </div>
  `;
}

function render(lista = filmes) {
  document.getElementById("filmes").innerHTML =
    lista.map(criarCard).join("");
}

/* BUSCA */
document.getElementById("search").addEventListener("input", function() {
  let valor = this.value.toLowerCase();

  let filtrados = filmes.filter(f =>
    f.nome.toLowerCase().includes(valor)
  );

  render(filtrados);
});

render();

</script>

</body>
</html>
