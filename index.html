<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metflix</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #141414;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: black;
}

header h1 { color: red; }

input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* PLAYER */
.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.player iframe {
  width: 100%;
  height: 75%;
  border: none;
}

.controls {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.btn-player {
  padding: 10px;
  text-decoration: none;
  color: white;
  background: purple;
  border-radius: 5px;
}

/* LISTA */
.section { padding: 10px; }

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.card {
  min-width: 140px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  font-size: 13px;
  padding: 5px;
}

.btn {
  display: block;
  text-align: center;
  padding: 8px;
  margin: 5px;
  text-decoration: none;
  color: white;
  background: green;
  cursor: pointer;
}

</style>
</head>

<body>

<header>
  <h1>METFLIX</h1>
  <input id="search" placeholder="Buscar...">
</header>

<!-- PLAYER -->
<div class="player" id="player">
  <iframe id="videoFrame"></iframe>

  <div class="controls">
    <a id="raveBtn" class="btn-player" target="_blank">📲 Assistir no Rave</a>
    <div class="btn-player" onclick="fecharPlayer()">❌ Fechar</div>
  </div>
</div>

<!-- FILMES -->
<div class="section">
  <h2>Filmes</h2>
  <div class="row" id="filmes"></div>
</div>

<script>

const filmes = [
  {
    nome: "Olhos Famintos",
    img: "https://image.tmdb.org/t/p/original/4deKiUXWqyATIEKCBSjRxCOLvu0.jpg",
    video: "https://drive.google.com/file/d/13sgdCjcgbF_3EN0ldWBWNktgwTyZE_sX/preview",
    rave: "https://drive.google.com/file/d/13sgdCjcgbF_3EN0ldWBWNktgwTyZE_sX/view?usp=sharing"
  }
];

// CRIAR CARD
function criarCard(f) {
  return `
  <div class="card">
    <img src="${f.img}">
    <h3>${f.nome}</h3>
    
    <div class="btn" onclick="abrirPlayer('${f.video}', '${f.rave}')">
      ▶ Assistir
    </div>
  </div>
  `;
}

// RENDER
function render(lista = filmes) {
  document.getElementById("filmes").innerHTML =
    lista.map(criarCard).join("");
}

// PLAYER
function abrirPlayer(video, rave) {
  document.getElementById("videoFrame").src = video;
  document.getElementById("raveBtn").href = rave;
  document.getElementById("player").style.display = "flex";
}

function fecharPlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("videoFrame").src = "";
}

// BUSCA
document.getElementById("search").addEventListener("input", function() {
  let valor = this.value.toLowerCase();

  let filtrados = filmes.filter(f =>
    f.nome.toLowerCase().includes(valor)
  );

  render(filtrados);
});

render();

</script>

</body>
</html>
