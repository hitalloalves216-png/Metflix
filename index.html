<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metflix</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #141414;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: black;
}

header h1 { color: red; }

input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* PLAYER */
.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 999;
}

.bg-blur {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: blur(20px);
  opacity: 0.3;
}

.player-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  height: 100%;
  backdrop-filter: brightness(0.6);
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-size: 18px;
}

.fechar {
  font-size: 25px;
  cursor: pointer;
}

.player iframe {
  flex: 1;
  width: 100%;
  border: none;
}

.controls {
  padding: 15px;
  text-align: center;
}

.controls a {
  background: black;
  border: 1px solid #e50914;
  padding: 12px 25px;
  border-radius: 6px;
  text-decoration: none;
  color: white;
}

/* LISTA */
.section { padding: 10px; }

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.card {
  min-width: 160px;
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  font-size: 13px;
  padding: 5px;
}

.btn {
  display: block;
  text-align: center;
  padding: 10px;
  margin: 5px;
  text-decoration: none;
  color: white;
  cursor: pointer;
}

.assistir {
  background: #e50914;
}

.rave {
  background: black;
  border: 1px solid #e50914;
}

.sinopse {
  font-size: 12px;
  padding: 5px 8px;
  color: #bbb;
}

/* ANIMAÇÃO */
.player-content {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<header>
  <h1>METFLIX</h1>
  <input id="search" placeholder="Buscar...">
</header>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="bg-blur" id="bgBlur"></div>

  <div class="player-content">
    <div class="topbar">
      <span id="tituloFilme"></span>
      <div class="fechar" onclick="fecharPlayer()">✕</div>
    </div>

    <iframe id="videoFrame" allowfullscreen></iframe>

    <div class="controls">
      <a id="raveBtn" target="_blank">📲 Assistir no Rave</a>
    </div>
  </div>
</div>

<!-- DETALHES -->
<div class="player" id="detalhes">

  <div class="bg-blur" id="bgDetalhes"></div>

  <div class="player-content">

    <div class="topbar">
      <span id="tituloDetalhes"></span>
      <div class="fechar" onclick="fecharDetalhes()">✕</div>
    </div>

    <div style="padding: 20px; text-align:center;">
      
      <div class="btn assistir" onclick="assistirAgora()">▶ Assistir aqui</div>
      
      <a id="raveDetalhes" class="btn rave" target="_blank">
        📲 Assistir no Rave
      </a>

      <p id="sinopseDetalhes" style="margin-top:20px; color:#ccc;"></p>

    </div>

  </div>
</div>

<!-- FILMES -->
<div class="section">
  <h2>Filmes</h2>
  <div class="row" id="filmes"></div>
</div>

<script>

const filmes = [
  {
    nome: "Olhos Famintos",
    img: "https://image.tmdb.org/t/p/original/4deKiUXWqyATIEKCBSjRxCOLvu0.jpg",
    sinopse: "Uma criatura misteriosa desperta a cada 23 anos para se alimentar de humanos.",
    video: "https://drive.google.com/file/d/13sgdCjcgbF_3EN0ldWBWNktgwTyZE_sX/preview",
    rave: "https://drive.google.com/file/d/13sgdCjcgbF_3EN0ldWBWNktgwTyZE_sX/view?usp=sharing"
  }
];

// VARIÁVEIS
let videoAtual = "";
let raveAtual = "";

// CARD
function criarCard(f) {
  return `
  <div class="card">
    <img src="${f.img}">
    <h3>${f.nome}</h3>

    <div class="btn assistir" onclick="abrirDetalhes('${f.video}', '${f.rave}', '${f.nome}', '${f.img}', '${f.sinopse}')">
      ▶ Assistir
    </div>
  </div>
  `;
}
