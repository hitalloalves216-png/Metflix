<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metflix</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #141414;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: black;
}

header h1 { color: red; }

input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* PLAYER */
.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.player iframe {
  width: 100%;
  height: 80%;
}

.close {
  padding: 10px;
  background: red;
  text-align: center;
  cursor: pointer;
}

/* LISTA */
.section { padding: 10px; }

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.card {
  min-width: 140px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  font-size: 13px;
  padding: 5px;
}

.btn {
  display: block;
  text-align: center;
  padding: 5px;
  margin: 3px;
  text-decoration: none;
  color: white;
}

.play { background: green; }
.rave { background: purple; }

</style>
</head>

<body>

<header>
  <h1>METFLIX</h1>
  <input id="search" placeholder="Buscar...">
</header>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="close" onclick="fecharPlayer()">FECHAR</div>
  <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<!-- FILMES -->
<div class="section">
  <h2>Filmes</h2>
  <div class="row" id="filmes"></div>
</div>

<script>

const filmes = [
  {
    nome: "Olhos Famintos",
    img: "https://image.tmdb.org/t/p/original/4deKiUXWqyATIEKCBSjRxCOLvu0.jpg",
    video: "https://drive.google.com/file/d/13sgdCjcgbF_3EN0ldWBWNktgwTyZE_sX/preview",
    rave: "https://drive.google.com/file/d/13sgdCjcgbF_3EN0ldWBWNktgwTyZE_sX/view"
  }
];

// CRIAR CARD
function criarCard(f) {
  return `
  <div class="card">
    <img src="${f.img}">
    <h3>${f.nome}</h3>
    
    <div class="btn play" onclick="abrirPlayer('${f.video}')">
      ▶ Assistir
    </div>

    <a class="btn rave" href="${f.rave}" target="_blank">
      📲 Rave
    </a>
  </div>
  `;
}

// RENDER
function render(lista = filmes) {
  document.getElementById("filmes").innerHTML =
    lista.map(criarCard).join("");
}

// PLAYER
function abrirPlayer(link) {
  document.getElementById("videoFrame").src = link;
  document.getElementById("player").style.display = "flex";
}

function fecharPlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("videoFrame").src = "";
}

// BUSCA
document.getElementById("search").addEventListener("input", function() {
  let valor = this.value.toLowerCase();

  let filtrados = filmes.filter(f =>
    f.nome.toLowerCase().includes(valor)
  );

  render(filtrados);
});

render();

</script>

</body>
</html>
